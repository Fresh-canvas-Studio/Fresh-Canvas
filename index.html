<!DOCTYPE html>

<html>

<head>

  <title>Your Brand</title>

  <style>

    body {

      font-family: Arial, sans-serif;

      background: linear-gradient(135deg, #ffe6f0, #e6f7ff);

      text-align: center;

      margin: 0;

      padding: 0;

    }

    header {

      padding: 60px;

    }

    h1 {

      font-size: 40px;

      color: #333;

    }

    p {

      font-size: 18px;

      color: #555;

    }

    .btn {

      background: #ff7aa2;

      color: white;

      padding: 12px 20px;

      border: none;

      border-radius: 20px;

      text-decoration: none;

      display: inline-block;

      margin-top: 20px;

    }

    .section {

      padding: 40px;

    }

    .card {

      background: white;

      padding: 20px;

      margin: 10px;

      border-radius: 15px;

      display: inline-block;

      width: 200px;

    }

  </style>

</head>

<body>

  <header>

    <h1>Your Canva Design Shop ✨</h1>

    <p>Aesthetic templates made with love</p>

    <a class="btn" href="#shop">Shop Now</a>

  </header>

  <div class="section" id="shop">

    <h2>Templates</h2>

    <div class="card">Instagram Post Pack</div>

    <div class="card">Business Branding Kit</div>

    <div class="card">School Project Designs</div>

  </div>

</body>

</html
